spring:
  application:
    name: notif-sys
  datasource:
    url: jdbc:postgresql://localhost:5432/notif
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# api-note 결정 4: API 에러는 SLF4J 파일 로그로 누적, 별도 테이블 미운용.
logging:
  file:
    name: logs/notif-sys.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14

notification:
  worker:
    max-fail-count: 5
    max-stuck-count: 3
    stuck-threshold-seconds: 60
    base-backoff-seconds: 5
    poll-interval-ms: 1000
    batch-size: 20