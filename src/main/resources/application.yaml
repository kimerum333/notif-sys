spring:
  application:
    name: notif-sys
  datasource:
    url: jdbc:postgresql://localhost:5432/notif
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

notification:
  worker:
    max-fail-count: 5
    max-stuck-count: 3
    stuck-threshold-seconds: 60
    base-backoff-seconds: 5
    poll-interval-ms: 1000
    batch-size: 20
